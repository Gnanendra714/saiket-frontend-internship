<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2 | Product Card</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <article class="product-card">
        <span class="badge">IoT Device</span>

        <img
          src="images/esp32.jpg"
          alt="ESP32 Development Board"
          class="product-image"
        />

        <h2 class="product-name">ESP32 Development Board</h2>

        <p class="product-description">
          ESP32 development board with built-in Wi-Fi and Bluetooth, perfect for
          IoT prototypes and embedded system applications.
        </p>

        <div class="price-container">
          <span class="original-price">₹799</span>
          <span class="price">₹649</span>
        </div>

        <button class="cart-btn">Add to Cart</button>
      </article>
    </main>
  </body>
</html>
